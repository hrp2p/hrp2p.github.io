<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИПР — p2p оценка</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F7F6F3; color: #1a1a18; min-height: 100vh; }
  .top-bar { background: #fff; border-bottom: 1px solid #e8e7e2; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo img { width: 28px; height: 28px; }
  .logo span { color: #7F77DD; }
  .btn-back { padding: 7px 14px; border: 1.5px solid #e8e7e2; background: #fff; border-radius: 8px; font-size: 13px; cursor: pointer; color: #5F5E5A; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 20px 60px; }
  .screen { display: none; } .screen.active { display: block; }
  .center-screen { text-align: center; padding: 80px 20px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e8e7e2; border-top-color: #7F77DD; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen-sub { font-size: 15px; color: #5F5E5A; }

  .emp-card { background: #fff; border-radius: 14px; border: 1px solid #e8e7e2; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .emp-left { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #534AB7; flex-shrink: 0; }
  .emp-name { font-size: 18px; font-weight: 600; color: #1a1a18; letter-spacing: -0.3px; }
  .emp-meta { font-size: 13px; color: #888780; margin-top: 2px; }
  .period-badge { background: #EEEDFE; color: #534AB7; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }

  .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .meta-card { background: #fff; border-radius: 10px; border: 1px solid #e8e7e2; padding: 12px; text-align: center; }
  .meta-val { font-size: 22px; font-weight: 600; color: #1a1a18; }
  .meta-label { font-size: 11px; color: #888780; margin-top: 3px; }

  .section-title { font-size: 11px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e7e2; margin-bottom: 12px; overflow: hidden; }

  .goal-card { background: #fff; border-radius: 12px; border: 1px solid #e8e7e2; margin-bottom: 10px; overflow: hidden; }
  .goal-head { padding: 14px 16px; border-bottom: 1px solid #F7F6F3; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .goal-comp { font-size: 11px; font-weight: 500; color: #534AB7; margin-bottom: 3px; }
  .goal-text { font-size: 14px; color: #1a1a18; line-height: 1.5; }
  .goal-score { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
  .goal-body { padding: 14px 16px; }
  .action-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .action-row:last-child { margin-bottom: 0; }
  .action-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #e8e7e2; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.15s; margin-top: 1px; }
  .action-check.done { background: #1D9E75; border-color: #1D9E75; }
  .action-check.done::after { content: '✓'; color: #fff; font-size: 11px; }
  .action-text { font-size: 13px; color: #5F5E5A; line-height: 1.5; flex: 1; }
  .action-text.done { text-decoration: line-through; color: #B4B2A9; }
  .goal-metric { padding: 10px 16px; background: #F7F6F3; font-size: 12px; color: #888780; border-top: 1px solid #e8e7e2; }

  .progress-bar-wrap { height: 6px; background: #F7F6F3; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: #7F77DD; transition: width 0.3s; }

  .info-block { padding: 14px 16px; font-size: 13px; line-height: 1.6; border-radius: 10px; margin-bottom: 10px; }
  .info-block.green { background: #E1F5EE; color: #0F6E56; }
  .info-block.purple { background: #EEEDFE; color: #3C3489; }
  .info-block.gray { background: #F7F6F3; color: #5F5E5A; font-style: italic; }

  .ipr-list { display: flex; flex-direction: column; gap: 10px; }
  .ipr-item { background: #fff; border-radius: 12px; border: 1px solid #e8e7e2; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .ipr-item:hover { border-color: #AFA9EC; }
  .ipr-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ipr-item-name { font-size: 15px; font-weight: 600; color: #1a1a18; }
  .ipr-item-meta { font-size: 12px; color: #888780; margin-top: 2px; }
  .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .status-active { background: #E1F5EE; color: #0F6E56; }
  .status-done { background: #F7F6F3; color: #888780; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><img src="favicon.png" alt="p2p">p2p<span>.</span>оценка</div>
  <button class="btn-back" id="btn-back" onclick="goBack()">← Назад</button>
</div>

<div class="container">
  <div class="screen active" id="screen-loading">
    <div class="center-screen"><div class="spinner"></div><div class="screen-sub">Загружаем ИПР...</div></div>
  </div>
  <div class="screen" id="screen-list">
    <div style="font-size:20px;font-weight:600;margin-bottom:4px;letter-spacing:-0.3px" id="list-title">ИПР сотрудников</div>
    <div style="font-size:14px;color:#888780;margin-bottom:20px" id="list-sub"></div>
    <div class="ipr-list" id="ipr-list"></div>
  </div>
  <div class="screen" id="screen-ipr"></div>
</div>

<script>
const SUPABASE_URL = 'https://atqyfxzayeuvsxphniru.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0cXlmeHpheWV1dnN4cGhuaXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjI5OTEsImV4cCI6MjA5NzQzODk5MX0.UVvf_ipQ1QtMFD0aerNzNUg5YVV078iCry0F5Wd3Nok';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const empName = params.get('emp');
const mgrName = params.get('mgr');
const iprId = params.get('id');
const token = params.get('token');

let currentIpr = null;
let actionStates = {};

function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function scoreColor(v) {
  if (!v) return { bg:'#F1EFE8', color:'#888780' };
  if (v <= 1.7) return { bg:'#FAECE7', color:'#993C1D' };
  if (v <= 2.2) return { bg:'#FAEEDA', color:'#854F0B' };
  return { bg:'#E1F5EE', color:'#0F6E56' };
}

function monthLabel(n) {
  if (n===1) return '1 месяц';
  if (n<5) return n+' месяца';
  return n+' месяцев';
}

async function init() {
  // Если открыт по ID напрямую (из HR дашборда) — показываем без проверки токена
  if (iprId) {
    await loadIpr(iprId, null, 'hr');
    return;
  }

  // Если открыт по токену — проверяем
  if (!token) {
    showAccessDenied('Ссылка недействительна', 'Получите ссылку на ИПР через Telegram-бот.');
    return;
  }

  const { data: users, error } = await db.from('users')
    .select('*')
    .eq('ipr_token', token)
    .limit(1);

  if (error || !users || users.length === 0) {
    showAccessDenied('Доступ закрыт', 'Токен недействителен или устарел. Получите новую ссылку через бота.');
    return;
  }

  const user = users[0];
  const role = user.role;
  const name = user.name;

  if (role === 'manager' || role === 'hr') {
    await loadByMgr(name);
  } else {
    await loadByEmp(name);
  }
}

function showAccessDenied(title, sub) {
  document.getElementById('screen-loading').innerHTML = `
    <div class="center-screen">
      <div style="width:56px;height:56px;background:#FAECE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i class="ti ti-lock" style="font-size:24px;color:#993C1D" aria-hidden="true"></i>
      </div>
      <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">${title}</div>
      <div style="font-size:14px;color:var(--color-text-secondary);line-height:1.6">${sub}</div>
    </div>`;
  showScreen('screen-loading');
}

async function loadAll() {
  const { data, error } = await db.from('ipr').select('*').order('created_at', { ascending: false });
  renderList(data||[], 'Все ИПР', '');
}

async function loadByEmp(name) {
  const { data } = await db.from('ipr').select('*').eq('emp_name', name).order('created_at', { ascending: false });
  renderList(data||[], 'Мой ИПР', name);
}

async function loadByMgr(name) {
  const { data } = await db.from('ipr').select('*').eq('mgr_name', name).order('created_at', { ascending: false });
  renderList(data||[], 'ИПР моих сотрудников', 'Руководитель: '+name);
}

function renderList(items, title, sub) {
  document.getElementById('list-title').textContent = title;
  document.getElementById('list-sub').textContent = sub;
  if (items.length === 0) {
    document.getElementById('ipr-list').innerHTML = '<div style="text-align:center;padding:40px;color:#888780;font-size:14px">Нет сохранённых ИПР</div>';
    showScreen('screen-list');
    return;
  }
  document.getElementById('ipr-list').innerHTML = items.map(ipr => {
    const date = new Date(ipr.created_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    const totalActions = (ipr.goals||[]).reduce((s,g)=>s+(g.actions||[]).length,0);
    return `<div class="ipr-item" onclick="loadIpr('${ipr.id}')">
      <div class="ipr-item-top">
        <div>
          <div class="ipr-item-name">${ipr.emp_name}</div>
          <div class="ipr-item-meta">${ipr.emp_role||''}${ipr.emp_dept?' · '+ipr.emp_dept:''} · ${date}</div>
        </div>
        <span class="status-badge ${ipr.status==='active'?'status-active':'status-done'}">${ipr.status==='active'?'Активный':'Завершён'}</span>
      </div>
      <div style="font-size:12px;color:#888780">${monthLabel(ipr.period_months)} · ${(ipr.goals||[]).length} компетенции · ${totalActions} действий</div>
    </div>`;
  }).join('');
  showScreen('screen-list');
}

async function loadIpr(id) {
  showScreen('screen-loading');
  const { data, error } = await db.from('ipr').select('*').eq('id', id).single();
  if (error || !data) { showScreen('screen-list'); return; }
  currentIpr = data;
  actionStates = {};
  renderIpr(data);
}

function renderIpr(ipr) {
  const date = new Date(ipr.created_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  const endDate = new Date(ipr.created_at);
  endDate.setMonth(endDate.getMonth() + ipr.period_months);
  const endDateStr = endDate.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  const totalActions = (ipr.goals||[]).reduce((s,g)=>s+(g.actions||[]).length,0);
  const doneActions = Object.values(actionStates).filter(v=>v).length;
  const progress = totalActions > 0 ? Math.round(doneActions/totalActions*100) : 0;

  let html = `
    <div class="emp-card">
      <div class="emp-left">
        <div class="avatar">${initials(ipr.emp_name)}</div>
        <div>
          <div class="emp-name">${ipr.emp_name}</div>
          <div class="emp-meta">${ipr.emp_role||''}${ipr.emp_dept?' · '+ipr.emp_dept:''}</div>
          <div class="emp-meta">Руководитель: ${ipr.mgr_name||'—'}</div>
        </div>
      </div>
      <div class="period-badge">${monthLabel(ipr.period_months)}</div>
    </div>

    <div class="meta-grid">
      <div class="meta-card">
        <div class="meta-val">${progress}%</div>
        <div class="meta-label">Прогресс</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="meta-card">
        <div class="meta-val">${doneActions}/${totalActions}</div>
        <div class="meta-label">Действий выполнено</div>
      </div>
      <div class="meta-card">
        <div class="meta-val">${endDateStr.split(' ').slice(0,2).join(' ')}</div>
        <div class="meta-label">Дедлайн</div>
      </div>
    </div>

    <div class="section-title">Цели развития</div>`;

  (ipr.goals||[]).forEach((g, gi) => {
    const sc = scoreColor(g.avg);
    html += `<div class="goal-card">
      <div class="goal-head">
        <div style="flex:1">
          <div class="goal-comp">${g.competency}</div>
          <div class="goal-text">${g.goal}</div>
        </div>
        ${g.avg!==undefined?`<div class="goal-score" style="background:${sc.bg};color:${sc.color}">${g.avg.toFixed(1)} / 3</div>`:''}
      </div>
      <div class="goal-body">`;

    (g.actions||[]).forEach((action, ai) => {
      const key = `${gi}_${ai}`;
      const done = actionStates[key] || false;
      html += `<div class="action-row">
        <div class="action-check ${done?'done':''}" onclick="toggleAction('${gi}','${ai}','${ipr.id}')" id="check-${gi}-${ai}"></div>
        <div class="action-text ${done?'done':''}" id="text-${gi}-${ai}">${action}</div>
      </div>`;
    });

    html += `</div><div class="goal-metric">📊 ${g.metric||''}</div></div>`;
  });

  if (ipr.strengths) html += `<div class="section-title" style="margin-top:16px">Опора на сильные стороны</div><div class="info-block green">${ipr.strengths}</div>`;
  if (ipr.manager_support) html += `<div class="section-title">Поддержка руководителя</div><div class="info-block purple">${ipr.manager_support}</div>`;
  if (ipr.hr_comment) html += `<div class="section-title">Комментарий HR</div><div class="info-block gray">${ipr.hr_comment}</div>`;

  html += `<div style="font-size:12px;color:#B4B2A9;margin-top:16px;text-align:center">ИПР создан ${date} · ${ipr.emp_name}</div>`;

  document.getElementById('screen-ipr').innerHTML = html;
  showScreen('screen-ipr');
}

function toggleAction(gi, ai, iprId) {
  const key = `${gi}_${ai}`;
  actionStates[key] = !actionStates[key];
  const check = document.getElementById(`check-${gi}-${ai}`);
  const text = document.getElementById(`text-${gi}-${ai}`);
  check.classList.toggle('done', actionStates[key]);
  text.classList.toggle('done', actionStates[key]);
  updateProgress();
}

function updateProgress() {
  if (!currentIpr) return;
  const totalActions = (currentIpr.goals||[]).reduce((s,g)=>s+(g.actions||[]).length,0);
  const doneActions = Object.values(actionStates).filter(v=>v).length;
  const progress = totalActions > 0 ? Math.round(doneActions/totalActions*100) : 0;
  const metaCards = document.querySelectorAll('.meta-card');
  if (metaCards[0]) metaCards[0].querySelector('.meta-val').textContent = progress+'%';
  if (metaCards[0]) metaCards[0].querySelector('.progress-bar-fill').style.width = progress+'%';
  if (metaCards[1]) metaCards[1].querySelector('.meta-val').textContent = doneActions+'/'+totalActions;
}

function goBack() {
  const active = document.querySelector('.screen.active');
  if (active && active.id === 'screen-ipr') {
    if (empName || mgrName || (!empName && !mgrName)) {
      showScreen('screen-list');
    } else {
      window.history.back();
    }
  } else {
    window.location.href = 'index.html';
  }
}

init();
</script>
</body>
</html>
