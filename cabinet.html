<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — p2p оценка</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F7F6F3; color: #1a1a18; min-height: 100vh; }
  .top-bar { background: #fff; border-bottom: 1px solid #e8e7e2; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo img { width: 28px; height: 28px; }
  .logo span { color: #7F77DD; }
  .container { max-width: 560px; margin: 0 auto; padding: 24px 20px 60px; }
  .screen { display: none; } .screen.active { display: block; }
  .center-screen { text-align: center; padding: 80px 20px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e8e7e2; border-top-color: #7F77DD; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen-sub { font-size: 15px; color: #5F5E5A; }

  .profile-card { background: #fff; border-radius: 14px; border: 1px solid #e8e7e2; overflow: hidden; margin-bottom: 16px; }
  .profile-header { padding: 16px 20px 14px; border-bottom: 1px solid #F7F6F3; display: flex; align-items: center; justify-content: space-between; }
  .profile-left { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #534AB7; flex-shrink: 0; }
  .profile-name { font-size: 14px; font-weight: 600; color: #1a1a18; }
  .profile-meta { font-size: 12px; color: #888780; }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px 20px; border-bottom: 1px solid #F7F6F3; }
  .stat-box { background: #F7F6F3; border-radius: 10px; padding: 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; color: #1a1a18; }
  .stat-label { font-size: 11px; color: #888780; margin-top: 2px; }

  .section { padding: 14px 20px; }
  .section-title { font-size: 11px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #F7F6F3; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: background 0.15s; }
  .item-row:hover { background: #EEEDFE; }
  .item-row:last-child { margin-bottom: 0; }
  .item-name { font-size: 13px; font-weight: 600; color: #1a1a18; }
  .item-sub { font-size: 12px; color: #888780; margin-top: 2px; }
  .item-score { font-size: 13px; font-weight: 600; color: #534AB7; }
  .item-chevron { font-size: 16px; color: #B4B2A9; margin-left: 8px; }

  .ipr-box { border-left: 3px solid #7F77DD; background: #F7F6F3; border-radius: 0 10px 10px 0; padding: 12px 14px; }
  .ipr-box-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ipr-box-title { font-size: 13px; font-weight: 600; color: #1a1a18; }
  .period-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #FAEEDA; color: #854F0B; font-weight: 500; }
  .goal-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .goal-row:last-child { margin-bottom: 0; }
  .goal-name { font-size: 12px; color: #5F5E5A; }
  .goal-score { font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }

  .empty-hint { font-size: 13px; color: #B4B2A9; text-align: center; padding: 20px 0; }

  .status-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .status-active { background: #FAEEDA; color: #854F0B; }
  .status-none { background: #F7F6F3; color: #B4B2A9; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><img src="favicon.png" alt="p2p">p2p<span>.</span>оценка</div>
</div>

<div class="container">
  <div class="screen active" id="screen-loading">
    <div class="center-screen"><div class="spinner"></div><div class="screen-sub">Загружаем кабинет...</div></div>
  </div>
  <div class="screen" id="screen-denied">
    <div class="center-screen">
      <div style="width:56px;height:56px;background:#FAECE7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px">🔒</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">Доступ закрыт</div>
      <div class="screen-sub" id="denied-text">Получите ссылку на личный кабинет через Telegram-бот.</div>
    </div>
  </div>
  <div class="screen" id="screen-employee"></div>
  <div class="screen" id="screen-manager"></div>
</div>

<script>
const SUPABASE_URL = 'https://atqyfxzayeuvsxphniru.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0cXlmeHpheWV1dnN4cGhuaXJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjI5OTEsImV4cCI6MjA5NzQzODk5MX0.UVvf_ipQ1QtMFD0aerNzNUg5YVV078iCry0F5Wd3Nok';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const forceView = params.get('view');

function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function initials(name) { return (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function scoreColor(v) {
  if (v === null || v === undefined) return {bg:'#F7F6F3',color:'#888780'};
  if (v <= 1.7) return {bg:'#FAECE7',color:'#993C1D'};
  if (v <= 2.2) return {bg:'#FAEEDA',color:'#854F0B'};
  return {bg:'#E1F5EE',color:'#0F6E56'};
}
function monthLabel(n) { if(n===1) return '1 месяц'; if(n<5) return n+' месяца'; return n+' месяцев'; }

async function init() {
  if (!token) {
    document.getElementById('denied-text').textContent = 'Получите ссылку на личный кабинет через Telegram-бот.';
    showScreen('screen-denied');
    return;
  }
  const { data: users, error } = await db.from('users').select('*').eq('ipr_token', token).limit(1);
  if (error || !users || users.length === 0) {
    document.getElementById('denied-text').textContent = 'Токен недействителен. Получите новую ссылку через бота.';
    showScreen('screen-denied');
    return;
  }
  const user = users[0];
  if (forceView === 'self') {
    await renderEmployee(user);
  } else if (user.role === 'manager' || user.role === 'hr') {
    await renderManager(user);
  } else {
    await renderEmployee(user);
  }
}

async function calcSessionsScores(empName) {
  const { data: sessions } = await db.from('sessions').select('*').eq('emp_name', empName).order('created_at', { ascending: false });
  const completed = (sessions||[]).filter(s => s.done_self || s.done_mgr);
  if (completed.length === 0) return { sessions: [], avgAll: null };
  const { data: responses } = await db.from('responses').select('*').in('session_id', completed.map(s=>s.id));
  const withScores = completed.map(s => {
    const resps = (responses||[]).filter(r=>r.session_id===s.id);
    const allScores = resps.flatMap(r => Object.values(r.scores||{}).filter(v=>v!==null&&v!==undefined));
    const avg = allScores.length ? allScores.reduce((a,b)=>a+b,0)/allScores.length : null;
    return { ...s, avg };
  });
  const allAvgs = withScores.filter(s=>s.avg!==null).map(s=>s.avg);
  const avgAll = allAvgs.length ? allAvgs.reduce((a,b)=>a+b,0)/allAvgs.length : null;
  return { sessions: withScores, avgAll };
}

async function renderEmployee(user) {
  const name = user.name;
  const { sessions, avgAll } = await calcSessionsScores(name);
  const { data: iprs } = await db.from('ipr').select('*').eq('emp_name', name).order('created_at', { ascending: false });
  const activeIprs = (iprs||[]).filter(i=>i.status==='active');
  const latestIpr = activeIprs[0];

  let html = `
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-left">
          <div class="avatar">${initials(name)}</div>
          <div>
            <div class="profile-name">${name}</div>
            <div class="profile-meta">${user.emp_dept||''}</div>
          </div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val">${sessions.length}</div><div class="stat-label">Оценки</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${avgAll!==null?'#0F6E56':'#888780'}">${avgAll!==null?avgAll.toFixed(1):'—'}</div><div class="stat-label">Средний балл</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${activeIprs.length?'#854F0B':'#888780'}">${activeIprs.length}</div><div class="stat-label">Активный ИПР</div></div>
      </div>

      <div class="section">
        <div class="section-title">Мои оценки</div>`;

  if (sessions.length === 0) {
    html += `<div class="empty-hint">Пока нет завершённых оценок</div>`;
  } else {
    sessions.forEach(s => {
      const date = new Date(s.created_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
      const canOpen = s.done_self || s.done_mgr;
      html += `<div class="item-row" onclick="${canOpen?`window.open('report.html?session=${s.id}','_blank')`:''}">
        <div><div class="item-name">${s.session_name}</div><div class="item-sub">${date}</div></div>
        <div style="display:flex;align-items:center">
          ${s.avg!==null?`<span class="item-score">${s.avg.toFixed(1)}</span>`:''}
          <i class="item-chevron">&rsaquo;</i>
        </div>
      </div>`;
    });
  }

  html += `</div>`;

  if (latestIpr) {
    const goals = latestIpr.goals || [];
    html += `<div class="section" style="border-top:1px solid #F7F6F3">
      <div class="section-title">Мой ИПР</div>
      <div class="ipr-box">
        <div class="ipr-box-head">
          <div class="ipr-box-title">План развития</div>
          <span class="period-badge">${monthLabel(latestIpr.period_months)}</span>
        </div>`;
    goals.forEach(g => {
      const c = scoreColor(g.avg);
      html += `<div class="goal-row"><div class="goal-name">${g.competency}</div><span class="goal-score" style="background:${c.bg};color:${c.color}">${g.avg!==undefined?g.avg.toFixed(1):'—'}</span></div>`;
    });
    html += `</div>
      <div style="text-align:center;margin-top:10px">
        <a href="ipr.html?token=${token}" style="font-size:12px;color:#534AB7;text-decoration:none">Открыть полный план &rarr;</a>
      </div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('screen-employee').innerHTML = html;
  showScreen('screen-employee');
}

async function renderManager(user) {
  const mgrName = user.name;
  const { data: subordinates } = await db.from('users').select('*').eq('manager_name', mgrName);
  const subs = subordinates || [];

  let activeIprCount = 0;
  const subData = [];
  for (const sub of subs) {
    const { sessions, avgAll } = await calcSessionsScores(sub.name);
    const { data: iprs } = await db.from('ipr').select('*').eq('emp_name', sub.name).eq('status','active');
    if (iprs && iprs.length) activeIprCount++;
    subData.push({ ...sub, sessionsCount: sessions.length, avgAll, hasActiveIpr: !!(iprs && iprs.length) });
  }

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:600">Мои сотрудники</div>
        <div style="font-size:13px;color:#888780">${mgrName}${user.emp_dept?' &middot; '+user.emp_dept:''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="background:#F7F6F3;border-radius:10px;padding:8px 14px;text-align:center">
          <div style="font-size:18px;font-weight:600">${subs.length}</div>
          <div style="font-size:11px;color:#888780">Подчинённых</div>
        </div>
        <div style="background:#FAEEDA;border-radius:10px;padding:8px 14px;text-align:center">
          <div style="font-size:18px;font-weight:600;color:#854F0B">${activeIprCount}</div>
          <div style="font-size:11px;color:#854F0B">Активных ИПР</div>
        </div>
      </div>
    </div>`;

  if (subs.length === 0) {
    html += `<div class="profile-card"><div class="empty-hint" style="padding:40px 20px">У вас пока нет подчинённых в базе.<br>Они появятся после регистрации в боте.</div></div>`;
  } else {
    html += `<div style="display:flex;flex-direction:column;gap:10px">`;
    subData.forEach(sub => {
      const canOpen = sub.sessionsCount > 0;
      html += `<div class="profile-card" style="margin-bottom:0;cursor:${canOpen?'pointer':'default'}" ${canOpen?`onclick="window.location.href='ipr.html?token=${token}&sub=${encodeURIComponent(sub.name)}'"`:''}>
        <div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="avatar" style="${canOpen?'':'background:#F7F6F3;color:#B4B2A9'}">${initials(sub.name)}</div>
            <div>
              <div class="item-name">${sub.name}</div>
              <div class="item-sub">${sub.sessionsCount} ${sub.sessionsCount===1?'оценка':'оценки'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${sub.hasActiveIpr?'<span class="status-chip status-active">ИПР активен</span>':''}
            ${sub.avgAll!==null?`<span style="font-size:14px;font-weight:600;color:#534AB7">${sub.avgAll.toFixed(1)}</span>`:'<span style="font-size:12px;color:#B4B2A9">&mdash;</span>'}
            ${canOpen?'<i class="item-chevron">&rsaquo;</i>':''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('screen-manager').innerHTML = html;
  showScreen('screen-manager');
}

init();
</script>
</body>
</html>
